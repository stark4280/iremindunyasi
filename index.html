      function triggerShake(duration, power) {
        if (duration >= game.shakeTimer) {
          game.shakeTimer = duration;
          game.shakeDuration = duration;
          game.shakePower = power;
        }
      }

      function addFloatText(text, x, y, color, scale) {
        if (floatTexts.length >= MAX_FLOAT_TEXTS) {
          floatTexts.shift();
        }

        floatTexts.push({
          text,
          x,
          y,
          color,
          scale: scale || 1,
          life: 0.78,
          maxLife: 0.78,
          velocityY: random(-30, -20)
        });
      }

      function addParticle(options) {
        if (particles.length >= MAX_PARTICLES) {
          particles.shift();
        }

        particles.push({
          x: options.x,
          y: options.y,
          velocityX: options.velocityX,
          velocityY: options.velocityY,
          gravity: options.gravity === undefined ? 260 : options.gravity,
          size: options.size,
          color: options.color,
          life: options.life,
          maxLife: options.life,
          kind: options.kind || "square",
          rotation: options.rotation || 0,
          spin: options.spin || 0
        });
      }

      function burst(x, y, amount, colors, options) {
        const settings = options || {};
        for (let index = 0; index < amount; index += 1) {
          const angle = random(0, TAU);
          const speed = random(settings.minSpeed || 45, settings.maxSpeed || 170);
          addParticle({
            x,
            y,
            velocityX: Math.cos(angle) * speed,
            velocityY: Math.sin(angle) * speed - (settings.lift || 0),
            gravity: settings.gravity === undefined ? 270 : settings.gravity,
            size: random(settings.minSize || 3, settings.maxSize || 7),
            color: choose(colors),
            life: random(settings.minLife || 0.38, settings.maxLife || 0.76),
            kind: Math.random() < (settings.heartChance || 0.18) ? "heart" : "square",
            rotation: random(0, TAU),
            spin: random(-8, 8)
          });
        }
      }

      function getPlayerBounds() {
        const width = player.size * 0.62;
        const height = player.size * 0.94;
        return {
          left: player.x - width * 0.5,
          top: player.y - player.size * 1.11,
          right: player.x + width * 0.5,
          bottom: player.y - player.size * 0.17
        };
      }

      function rectanglesOverlap(first, second) {
        return first.left < second.right && first.right > second.left && first.top < second.bottom && first.bottom > second.top;
      }

      function obstacleBounds(obstacle) {
        const insetX = Math.max(4, obstacle.width * 0.1);
        const insetY = Math.max(4, obstacle.height * 0.08);
        return {
          left: obstacle.x - obstacle.width * 0.5 + insetX,
          top: obstacle.y + insetY,
          right: obstacle.x + obstacle.width * 0.5 - insetX,
          bottom: obstacle.y + obstacle.height - insetY
        };
      }

      function pickupBounds(pickup) {
        const radius = pickup.size * 0.35;
        return {
          left: pickup.x - radius,
          top: pickup.y - radius,
          right: pickup.x + radius,
          bottom: pickup.y + radius
        };
      }

      function createObstacle(x, y, width, height) {
        obstacles.push({
          x,
          y,
          width,
          height,
          speedMultiplier: random(0.91, 1.09),
          colors: choose([
            { front: "#ed76b2", top: "#ffb8da", side: "#be4a89", accent: "#ffd5e9" },
            { front: "#b984e5", top: "#dac2ff", side: "#875cb8", accent: "#f0e4ff" },
            { front: "#e98ec3", top: "#ffc3e2", side: "#b75691", accent: "#ffe3f2" },
            { front: "#a98bd9", top: "#d5c7f5", side: "#7662a8", accent: "#efeaff" }
          ]),
          seed: Math.floor(random(0, 10000)),
          wobble: random(0, TAU)
        });
      }

      function spawnObstacles() {
        const sideMargin = 10;
        const firstWidth = random(player.size * 0.72, player.size * 1.18);
        const firstHeight = random(firstWidth * 0.65, firstWidth * 1.02);
        const firstX = random(sideMargin + firstWidth * 0.5, view.width - sideMargin - firstWidth * 0.5);
        createObstacle(firstX, -firstHeight - 12, firstWidth, firstHeight);

        const canSpawnPair = game.elapsed > 10 && view.width > 340 && Math.random() < 0.27;
        if (!canSpawnPair) {
          return;
        }

        const secondWidth = random(player.size * 0.65, player.size * 1.02);
        const secondHeight = random(secondWidth * 0.65, secondWidth * 0.98);
        let secondX = 0;
        let foundLane = false;
        const minimumGap = player.size * 0.86 + 58;

        for (let attempt = 0; attempt < 10; attempt += 1) {
          const candidate = random(sideMargin + secondWidth * 0.5, view.width - sideMargin - secondWidth * 0.5);
          const edgeDistance = Math.abs(candidate - firstX) - (firstWidth + secondWidth) * 0.5;
          if (edgeDistance > minimumGap) {
            secondX = candidate;
            foundLane = true;
            break;
          }
        }

        if (foundLane) {
          createObstacle(secondX, -secondHeight - random(22, 48), secondWidth, secondHeight);
        }
      }

      function spawnPickup() {
        const size = random(29, 39);
        const crystalChance = clamp(
          (game.missionComplete ? 0.18 : 0.46) + game.fortuneLevel * 0.16,
          0.18,
          0.86
        );
        const type = Math.random() < crystalChance
          ? "crystal"
          : (Math.random() < 0.56 ? "heart" : "milk");
        pickups.push({
          x: random(size, view.width - size),
          y: -size - 20,
          size,
          type,
          speedMultiplier: random(0.78, 0.94),
          bobPhase: random(0, TAU),
          spin: random(-2.5, 2.5)
        });
      }

      function getObstacleInterval() {
        return Math.max(0.43, 0.86 - game.elapsed * 0.014) + random(-0.075, 0.1);
      }

      function getFallSpeed() {
        return Math.min(420, 210 + game.elapsed * 5.1);
      }

      function collectPickup(index) {
        const pickup = pickups[index];
        game.combo = game.comboTimer > 0 ? Math.min(3, game.combo + 1) : 1;
        game.comboTimer = 1.5;

        const baseScore = pickup.type === "crystal" ? 190 : (pickup.type === "milk" ? 125 : 75);
        const points = baseScore * game.combo;
        addScore(points);
        playCollectSound(pickup.type);
        triggerShake(pickup.type === "crystal" ? 0.18 : (pickup.type === "milk" ? 0.16 : 0.11), pickup.type === "crystal" ? 8 : (pickup.type === "milk" ? 7 : 5));

        const colors = pickup.type === "crystal"
          ? ["#8be6db", "#b69cff", "#fff8ad", "#fffaff", "#ff9fc9"]
          : (pickup.type === "milk"
            ? ["#fffaff", "#ff9fc9", "#f9dd83", "#cba4ff", "#b8e6c8"]
            : ["#ff72b2", "#ffb3d6", "#fffaff", "#d2b4ff", "#ffe58d"]);
        burst(pickup.x, pickup.y, pickup.type === "crystal" ? 28 : (pickup.type === "milk" ? 24 : 19), colors, {
          minSpeed: 50,
          maxSpeed: 180,
          lift: 30,
          heartChance: 0.38,
          minSize: 3,
          maxSize: 8,
          minLife: 0.38,
          maxLife: 0.9
        });
        const pickupLabel = pickup.type === "crystal" ? "Kristal!" : (pickup.type === "milk" ? "Süt!" : "♥");
        addFloatText("+" + points + " " + pickupLabel, pickup.x, pickup.y - 12, "#a34f85", 1);
        if (game.combo > 1) {
          addFloatText("x" + game.combo + " Tatlı Seri!", player.x, player.y - player.size * 1.65, "#8658b6", 0.8);
        }

        if (pickup.type === "crystal") {
          game.crystalCount += 1;
          if (!game.missionComplete && game.crystalCount >= game.crystalTarget) {
            game.missionComplete = true;
            addFloatText("Kristal Misyonu Tamam!", player.x, player.y - player.size * 1.95, "#7160ad", 0.85);
            burst(player.x, player.y - player.size * 0.72, 22, ["#8be6db", "#d7baff", "#fff4a7", "#fffaff"], {
              minSpeed: 42,
              maxSpeed: 155,
              lift: 35,
              heartChance: 0.22,
              minSize: 3,
              maxSize: 8,
              minLife: 0.35,
              maxLife: 0.82
            });
          }
        }

        gainEnergy(pickup.type === "crystal" ? 42 : (pickup.type === "milk" ? 28 : 19));
        updateAdventureDisplay(false);

        pickups.splice(index, 1);
      }

      function destroyObstacle(index, source) {
        const obstacle = obstacles[index];
        const reason = source || "sinem";
        const points = reason === "power" ? 45 : (reason === "grace" ? 15 : 30);
        addScore(points);
        gainEnergy(reason === "sinem" ? 9 : (reason === "power" ? 6 : 0));
        playExplosionSound();
        triggerShake(0.09, 4);
        burst(obstacle.x, obstacle.y + obstacle.height * 0.5, 18, [
          obstacle.colors.front,
          obstacle.colors.top,
          obstacle.colors.side,
          "#fff7fc",
          "#ff86be"
        ], {
          minSpeed: 45,
          maxSpeed: 190,
          lift: 38,
          heartChance: 0.22,
          minSize: 3,
          maxSize: 8,
          minLife: 0.3,
          maxLife: 0.67
        });
        addFloatText("+" + points + " Pat!", obstacle.x, obstacle.y, "#a45288", 0.82);
        obstacles.splice(index, 1);
      }

      function activateSinem() {
        if (game.phase === "gameover" || game.phase === "upgrade" || game.sinemTimer > 0 || game.cooldownTimer > 0) {
          return;
        }

        startAudio();
        game.sinemTimer = 8;
        triggerShake(0.18, 8);
        burst(player.x, player.y - player.size * 0.68, 31, ["#ff79b8", "#efb5ff", "#8fe4da", "#fff5a6", "#fffaff"], {
          minSpeed: 55,
          maxSpeed: 205,
          lift: 52,
          heartChance: 0.55,
          minSize: 3,
          maxSize: 9,
          minLife: 0.48,
          maxLife: 1.05
        });
        addFloatText("Sinem Gücü!", player.x, player.y - player.size * 1.72, "#864db2", 1.22);
        playSinemSound();
        updateHelpButton(true);
      }

      function activatePower() {
        if (game.phase === "gameover" || game.phase === "upgrade" || game.powerTimer > 0 || game.energy < 100) {
          return;
        }

        startAudio();
        game.energy = 0;
        game.powerTimer = 5;
        triggerShake(0.19, 9);
        burst(player.x, player.y - player.size * 0.6, 34, ["#ffe78d", "#ffc887", "#ff8dbd", "#fffaff", "#d1b5ff"], {
          minSpeed: 56,
          maxSpeed: 210,
          lift: 54,
          heartChance: 0.28,
          minSize: 3,
          maxSize: 9,
          minLife: 0.44,
          maxLife: 1.02
        });
        addFloatText("Pati Patlaması!", player.x, player.y - player.size * 1.8, "#b55e69", 1.08);
        playPowerSound();
        updatePowerButton(true);
        updateAdventureDisplay(false);
      }

      function completeStage() {
        if (game.phase !== "playing" || game.stageProgress < game.stageGoal || !game.missionComplete) {
          return;
        }

        game.phase = "upgrade";
        game.stageClearTimer = 0.65;
        game.powerTimer = 0;
        obstacles.length = 0;
        pickups.length = 0;
        triggerShake(0.22, 10);
        burst(player.x, player.y - player.size * 0.72, 42, ["#ff98c5", "#d3b4ff", "#8fe4d3", "#fff0a6", "#fffaff"], {
          minSpeed: 55,
          maxSpeed: 225,
          lift: 65,
          heartChance: 0.38,
          minSize: 3,
          maxSize: 10,
          minLife: 0.52,
          maxLife: 1.15
        });
        addFloatText("Bölüm Tamamlandı!", player.x, player.y - player.size * 1.85, "#8459a7", 1.05);
        upgradeText.textContent = getZone().name + " tamam! Yeni bölüm için bir sihir seç.";
        upgradeOverlay.classList.add("is-visible");
        playStageSound();
        updateHelpButton(true);
        updatePowerButton(true);
      }

      function applyUpgrade(upgrade) {
        if (game.phase !== "upgrade") {
          return;
        }

        if (upgrade === "magnet") {
          game.magnetLevel = Math.min(3, game.magnetLevel + 1);
          addFloatText("Kalp Mıknatısı +" + game.magnetLevel, player.x, player.y - player.size * 1.75, "#e4649d", 0.88);
        } else if (upgrade === "fortune") {
          game.fortuneLevel = Math.min(3, game.fortuneLevel + 1);
          addFloatText("Kristal Şansı +" + game.fortuneLevel, player.x, player.y - player.size * 1.75, "#7562b3", 0.88);
        } else if (upgrade === "grace") {
          game.graceCharges += 2;
          addFloatText("Yumuşak İniş +2 Kalkan!", player.x, player.y - player.size * 1.75, "#4f9d79", 0.88);
        } else {
          return;
        }

        startAudio();
        playStageSound();
        game.stage += 1;
        game.stageProgress = 0;
        game.stageGoal = getStageGoal(game.stage);
        game.stageClearTimer = 0;
        game.crystalCount = 0;
        game.crystalTarget = getCrystalTarget(game.stage);
        game.missionComplete = false;
        game.obstacleTimer = 0.7;
        game.pickupTimer = 1.55;
        game.phase = "playing";
        upgradeOverlay.classList.remove("is-visible");
        buildBackground();
        burst(player.x, player.y - player.size * 0.65, 22, ["#ff9fc9", "#d7bbff", "#b8ead0", "#fffaff"], {
          minSpeed: 40,
          maxSpeed: 155,
          lift: 35,
          heartChance: 0.25,
          minSize: 3,
          maxSize: 8,
          minLife: 0.4,
          maxLife: 0.82
        });
        updateAdventureDisplay(true);
        updateHelpButton(true);
        updatePowerButton(true);
      }

      function endGame() {
        if (game.phase === "gameover") {
          return;
        }

        game.phase = "gameover";
        game.sinemTimer = 0;
        game.cooldownTimer = 0;
        game.powerTimer = 0;
        triggerShake(0.2, 10);
        burst(player.x, player.y - player.size * 0.62, 26, ["#ff8fbd", "#fffaff", "#d9b5f1", "#f5ccde"], {
          minSpeed: 36,
          maxSpeed: 160,
          lift: 25,
          heartChance: 0.25,
          minSize: 3,
          maxSize: 8,
          minLife: 0.35,
          maxLife: 0.75
        });
        playCrashSound();
        finalScore.textContent = String(Math.floor(game.score));
        upgradeOverlay.classList.remove("is-visible");
        restartOverlay.classList.add("is-visible");
        updateHelpButton(true);
        updatePowerButton(true);
      }

      function updatePlayer(delta) {
        const sidePadding = player.size * 0.5 + 8;
        player.targetX = clamp(player.targetX, sidePadding, view.width - sidePadding);
        const difference = player.targetX - player.x;
        const follow = Math.min(1, delta * 16);
        player.x += difference * follow;
        player.tilt = lerp(player.tilt, clamp(difference / Math.max(1, player.size), -0.22, 0.22), Math.min(1, delta * 10));
        player.bob += delta * 6;
        player.y = getGroundY() - 4;
      }

      function updateParticles(delta) {
        for (let index = particles.length - 1; index >= 0; index -= 1) {
          const particle = particles[index];
          particle.life -= delta;
          if (particle.life <= 0) {
            particles.splice(index, 1);
            continue;
          }

          particle.x += particle.velocityX * delta;
          particle.y += particle.velocityY * delta;
          particle.velocityY += particle.gravity * delta;
          particle.velocityX *= 0.992;
          particle.rotation += particle.spin * delta;
        }

        for (let index = floatTexts.length - 1; index >= 0; index -= 1) {
          const floating = floatTexts[index];
          floating.life -= delta;
          if (floating.life <= 0) {
            floatTexts.splice(index, 1);
            continue;
          }
          floating.y += floating.velocityY * delta;
        }
      }

      function updateTimers(delta) {
        if (game.shakeTimer > 0) {
          game.shakeTimer = Math.max(0, game.shakeTimer - delta);
        }

        if (game.comboTimer > 0) {
          game.comboTimer -= delta;
          if (game.comboTimer <= 0) {
            game.comboTimer = 0;
            game.combo = 0;
          }
        }

        if (game.sinemTimer > 0) {
          game.sinemTimer -= delta;
          if (game.sinemTimer <= 0) {
            game.sinemTimer = 0;
            game.cooldownTimer = 30;
          }
          updateHelpButton(false);
        } else if (game.cooldownTimer > 0) {
          game.cooldownTimer = Math.max(0, game.cooldownTimer - delta);
          updateHelpButton(false);
        }

        if (game.powerTimer > 0) {
          game.powerTimer -= delta;
          if (game.powerTimer <= 0) {
            game.powerTimer = 0;
            addFloatText("Pati Modu Bitti", player.x, player.y - player.size * 1.65, "#a76c75", 0.74);
          }
          updatePowerButton(false);
        }
      }

      function updateWorld(delta) {
        game.scoreFraction += delta * 10;
        if (game.scoreFraction >= 1) {
          const points = Math.floor(game.scoreFraction);
          game.scoreFraction -= points;
          addScore(points);
        }

        game.obstacleTimer -= delta;
        if (game.obstacleTimer <= 0) {
          spawnObstacles();
          game.obstacleTimer += getObstacleInterval();
        }

        game.pickupTimer -= delta;
        if (game.pickupTimer <= 0) {
          spawnPickup();
          game.pickupTimer = random(2.7, 4.5);
        }

        const playerBounds = getPlayerBounds();
        const fallSpeed = getFallSpeed();
        for (let index = obstacles.length - 1; index >= 0; index -= 1) {
          const obstacle = obstacles[index];
          obstacle.y += fallSpeed * obstacle.speedMultiplier * delta;
          obstacle.wobble += delta * 1.2;

          if (obstacle.y > view.height + obstacle.height + 24) {
            obstacles.splice(index, 1);
            continue;
          }

          if (rectanglesOverlap(playerBounds, obstacleBounds(obstacle))) {
            if (game.sinemTimer > 0) {
              destroyObstacle(index, "sinem");
            } else if (game.powerTimer > 0) {
              destroyObstacle(index, "power");
            } else if (game.graceCharges > 0) {
              game.graceCharges -= 1;
              destroyObstacle(index, "grace");
              triggerShake(0.14, 6);
              addFloatText("Yumuşak İniş!", player.x, player.y - player.size * 1.7, "#529677", 0.92);
              updateAdventureDisplay(false);
            } else {
              endGame();
              return;
            }
            continue;
          }

          const closeDistance = (obstacle.width + player.size * 0.62) * 0.5 + 24;
          const passedPlayer = obstacle.y > playerBounds.bottom - 10 && obstacle.y < playerBounds.bottom + 58;
          if (!obstacle.nearMissed && passedPlayer && Math.abs(obstacle.x - player.x) < closeDistance) {
            obstacle.nearMissed = true;
            game.nearMisses += 1;
            gainEnergy(11);
            addFloatText("Yakın Kaçış! +Enerji", player.x, player.y - player.size * 1.62, "#a97553", 0.72);
          }
        }

        for (let index = pickups.length - 1; index >= 0; index -= 1) {
          const pickup = pickups[index];
          pickup.y += fallSpeed * pickup.speedMultiplier * delta;
          pickup.bobPhase += delta * 5;

          if (game.magnetLevel > 0) {
            const magnetX = player.x - pickup.x;
            const magnetY = (player.y - player.size * 0.65) - pickup.y;
            const distance = Math.hypot(magnetX, magnetY);
            const range = Math.min(view.width * 0.9, 190 + game.magnetLevel * 105);
            if (distance > 1 && distance < range) {
              const pull = (0.45 + (1 - distance / range) * 0.85) * (520 + game.magnetLevel * 260);
              pickup.x += (magnetX / distance) * pull * delta;
              pickup.y += (magnetY / distance) * pull * delta;
            }
          }

          if (pickup.y > view.height + pickup.size + 24) {
            pickups.splice(index, 1);
            continue;
          }

          if (rectanglesOverlap(playerBounds, pickupBounds(pickup))) {
            collectPickup(index);
          }
        }

        completeStage();
      }

      function update(delta) {
        updateParticles(delta);
        updateTimers(delta);

        if (game.phase === "gameover" || game.phase === "upgrade") {
          return;
        }

        game.elapsed += delta;
        updatePlayer(delta);

        if (game.phase === "intro") {
          game.introTimer -= delta;
          if (game.introTimer <= 0) {
            game.introTimer = 0;
            game.phase = "playing";
          }
          return;
        }

        updateWorld(delta);
      }

      function drawCloud(x, y, scale) {
        const unit = 16 * scale;
        ctx.fillStyle = "rgba(255, 250, 253, 0.78)";
        ctx.fillRect(x, y + unit * 0.72, unit * 4.2, unit * 0.86);
        ctx.fillRect(x + unit * 0.55, y + unit * 0.34, unit * 2.85, unit * 1.23);
        ctx.fillRect(x + unit * 1.22, y, unit * 1.28, unit * 1.55);
        ctx.fillStyle = "rgba(232, 177, 210, 0.25)";
        ctx.fillRect(x + unit * 0.4, y + unit * 1.58, unit * 3.5, unit * 0.19);
      }

      function drawBackground() {
        const zone = getZone();
        ctx.fillStyle = zone.sky;
        ctx.fillRect(0, 0, view.width, view.height);
        ctx.fillStyle = zone.skyLight;
        ctx.fillRect(0, 0, view.width, Math.min(view.height * 0.28, 230));

        for (const sparkle of background.sparkles) {
          const twinkle = 0.55 + Math.sin(game.elapsed * 2.5 + sparkle.phase) * 0.35;
          ctx.globalAlpha = twinkle;
          ctx.fillStyle = sparkle.color;
          ctx.fillRect(Math.round(sparkle.x), Math.round(sparkle.y), sparkle.size, sparkle.size);
          if (sparkle.size >= 3) {
            ctx.fillRect(Math.round(sparkle.x - 1), Math.round(sparkle.y + 1), sparkle.size + 2, 1);
          }
        }
        ctx.globalAlpha = 1;

        for (const cloud of background.clouds) {
          const travel = ((game.elapsed * cloud.speed + cloud.x) % (view.width + 100)) - 50;
          drawCloud(travel, cloud.y, cloud.scale);
        }

        const groundY = getGroundY();
        for (const hill of background.hills) {
          const topY = groundY - hill.height;
          ctx.fillStyle = hill.tone;
          ctx.fillRect(hill.x, topY, hill.width, hill.height + 2);
          ctx.fillStyle = hill.cap;
          ctx.fillRect(hill.x, topY, hill.width, Math.max(4, hill.width * 0.16));
          ctx.fillStyle = "rgba(255,255,255,0.24)";
          for (let speck = 0; speck < hill.specks; speck += 1) {
            const px = hill.x + 5 + ((hill.specks * 11 + speck * 13) % Math.max(6, hill.width - 9));
            const py = topY + 12 + ((speck * 17) % Math.max(10, hill.height - 15));
            ctx.fillRect(Math.round(px), Math.round(py), 3, 3);
          }
        }

        ctx.fillStyle = zone.ground;
        ctx.fillRect(0, groundY, view.width, view.height - groundY);
        ctx.fillStyle = zone.grass;
        ctx.fillRect(0, groundY, view.width, 10);
        ctx.fillStyle = zone.grassLight;
        ctx.fillRect(0, groundY, view.width, 4);

        const tileSize = 19;
        for (let y = groundY + 12, row = 0; y < view.height; y += tileSize, row += 1) {
          for (let x = (row % 2) * -8; x < view.width; x += tileSize) {
            ctx.fillStyle = row % 2 === 0 ? "rgba(224,245,221,0.24)" : "rgba(97,162,124,0.16)";
            ctx.fillRect(Math.round(x + 3), Math.round(y + 3), 5, 5);
          }
        }

        for (const flower of background.flowers) {
          const flowerY = groundY + flower.y;
          if (flowerY > view.height - 3) {
            continue;
          }
          ctx.fillStyle = flower.color;
          ctx.fillRect(Math.round(flower.x), Math.round(flowerY), flower.size, flower.size);
          ctx.fillStyle = "#fff9fb";
          ctx.fillRect(Math.round(flower.x + flower.size * 0.35), Math.round(flowerY + flower.size * 0.35), 1.5, 1.5);
        }
      }

      function drawPixelBlock(obstacle) {
        const x = Math.round(obstacle.x - obstacle.width * 0.5);
        const y = Math.round(obstacle.y);
        const width = Math.round(obstacle.width);
        const height = Math.round(obstacle.height);
        const bevelX = clamp(Math.round(width * 0.16), 5, 13);
        const bevelY = clamp(Math.round(height * 0.16), 5, 13);
        const frontHeight = height - bevelY;
        const frontWidth = width - bevelX;

        ctx.fillStyle = obstacle.colors.side;
        ctx.fillRect(x + frontWidth, y + bevelY, bevelX, frontHeight);
        ctx.fillStyle = obstacle.colors.front;
        ctx.fillRect(x, y + bevelY, frontWidth, frontHeight);
        ctx.fillStyle = obstacle.colors.top;
        ctx.beginPath();
        ctx.moveTo(x, y + bevelY);
        ctx.lineTo(x + bevelX, y);
        ctx.lineTo(x + width, y);
        ctx.lineTo(x + frontWidth, y + bevelY);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = obstacle.colors.accent;
        const pixelSize = clamp(Math.round(width * 0.1), 3, 7);
        const offsetOne = (obstacle.seed % 11) / 11;
        const offsetTwo = ((obstacle.seed * 7) % 13) / 13;
        ctx.fillRect(Math.round(x + frontWidth * (0.16 + offsetOne * 0.24)), Math.round(y + bevelY + frontHeight * 0.19), pixelSize, pixelSize);
        ctx.fillRect(Math.round(x + frontWidth * (0.5 + offsetTwo * 0.19)), Math.round(y + bevelY + frontHeight * 0.56), pixelSize, pixelSize);
        ctx.fillStyle = "rgba(91,46,91,0.12)";
        ctx.fillRect(x + 3, y + height - pixelSize - 3, Math.max(pixelSize, frontWidth * 0.26), pixelSize);
      }

      function drawPixelHeart(x, y, size, color) {
        const unit = Math.max(1, size / 7);
        const cells = [
          [1, 0], [2, 0], [4, 0], [5, 0],
          [0, 1], [1, 1], [2, 1], [3, 1], [4, 1], [5, 1], [6, 1],
          [0, 2], [1, 2], [2, 2], [3, 2], [4, 2], [5, 2], [6, 2],
          [1, 3], [2, 3], [3, 3], [4, 3], [5, 3],
          [2, 4], [3, 4], [4, 4],
          [3, 5]
        ];
        ctx.fillStyle = color;
        for (const cell of cells) {
          ctx.fillRect(x + (cell[0] - 3) * unit, y + (cell[1] - 2.5) * unit, Math.ceil(unit), Math.ceil(unit));
        }
        ctx.fillStyle = "rgba(255,255,255,0.58)";
        ctx.fillRect(x - unit, y - unit * 1.5, Math.max(1, unit), Math.max(1, unit));
      }

      function drawMilkBottle(x, y, size) {
        const width = size * 0.62;
        const height = size * 0.92;
        const left = x - width * 0.5;
        const top = y - height * 0.5;
        const neckWidth = width * 0.38;
        const neckLeft = x - neckWidth * 0.5;

        ctx.fillStyle = "#a25b90";
        ctx.fillRect(Math.round(left - 2), Math.round(top + height * 0.25), Math.round(width + 4), Math.round(height * 0.75 + 2));
        ctx.fillStyle = "#fffafe";
        ctx.fillRect(Math.round(left), Math.round(top + height * 0.26), Math.round(width), Math.round(height * 0.7));
        ctx.fillStyle = "#fffafe";
        ctx.fillRect(Math.round(neckLeft), Math.round(top + height * 0.08), Math.round(neckWidth), Math.round(height * 0.24));
        ctx.fillStyle = "#f27eae";
        ctx.fillRect(Math.round(neckLeft - 2), Math.round(top), Math.round(neckWidth + 4), Math.round(height * 0.12));
        ctx.fillStyle = "#ffc4dc";
        ctx.fillRect(Math.round(left + width * 0.18), Math.round(top + height * 0.42), Math.round(width * 0.64), Math.round(height * 0.3));
        drawPixelHeart(x, y + height * 0.02, size * 0.26, "#e95e9a");
        ctx.fillStyle = "rgba(255,255,255,0.78)";
        ctx.fillRect(Math.round(left + width * 0.12), Math.round(top + height * 0.34), Math.max(2, Math.round(width * 0.12)), Math.round(height * 0.36));
      }

      function drawCrystal(x, y, size) {
        const width = size * 0.62;
        const height = size * 0.92;
        ctx.fillStyle = "#7657ad";
        ctx.beginPath();
        ctx.moveTo(x, y - height * 0.56);
        ctx.lineTo(x + width * 0.53, y - height * 0.14);
        ctx.lineTo(x + width * 0.28, y + height * 0.5);
        ctx.lineTo(x, y + height * 0.66);
        ctx.lineTo(x - width * 0.28, y + height * 0.5);
        ctx.lineTo(x - width * 0.53, y - height * 0.14);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#89e6db";
        ctx.beginPath();
        ctx.moveTo(x, y - height * 0.43);
        ctx.lineTo(x + width * 0.31, y - height * 0.12);
        ctx.lineTo(x, y + height * 0.49);
        ctx.lineTo(x - width * 0.31, y - height * 0.12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#d7c6ff";
        ctx.beginPath();
        ctx.moveTo(x, y - height * 0.43);
        ctx.lineTo(x, y + height * 0.49);
        ctx.lineTo(x - width * 0.31, y - height * 0.12);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "#fff9ff";
        ctx.fillRect(Math.round(x - width * 0.14), Math.round(y - height * 0.26), Math.max(2, Math.round(width * 0.13)), Math.max(3, Math.round(height * 0.21)));
        ctx.fillStyle = "#fff0a8";
        ctx.fillRect(Math.round(x + width * 0.13), Math.round(y + height * 0.11), Math.max(2, Math.round(width * 0.1)), Math.max(2, Math.round(height * 0.1)));
      }

      function drawPickup(pickup) {
        const bob = Math.sin(pickup.bobPhase) * 3;
        ctx.save();
        ctx.translate(Math.round(pickup.x), Math.round(pickup.y + bob));
        ctx.rotate(Math.sin(pickup.bobPhase * 0.5) * 0.08);
        if (pickup.type === "heart") {
          drawPixelHeart(0, 0, pickup.size, "#ff6eae");
        } else if (pickup.type === "milk") {
          drawMilkBottle(0, 0, pickup.size);
        } else {
          drawCrystal(0, 0, pickup.size);
        }
        ctx.restore();
      }

      function drawShield() {
        if (game.sinemTimer <= 0) {
          return;
        }

        const centerX = player.x;
        const centerY = player.y - player.size * 0.68;
        const pulse = 1 + Math.sin(game.elapsed * 9) * 0.05;
        const alpha = 0.48 + Math.sin(game.elapsed * 7) * 0.16;
        const rings = [
          { radius: player.size * 0.82 * pulse, color: "#ff73b7", width: 4 },
          { radius: player.size * 0.98 * pulse, color: "#d69dff", width: 3 },
          { radius: player.size * 1.12 * pulse, color: "#83e2d4", width: 2 }
        ];

        ctx.save();
        ctx.globalAlpha = alpha;
        for (const ring of rings) {
          ctx.strokeStyle = ring.color;
          ctx.lineWidth = ring.width;
          ctx.setLineDash([5, 5]);
          ctx.lineDashOffset = -game.elapsed * 28 * (ring.width / 2);
          ctx.beginPath();
          ctx.arc(centerX, centerY, ring.radius, 0, TAU);
          ctx.stroke();
        }
        ctx.setLineDash([]);
        ctx.globalAlpha = 1;
        for (let index = 0; index < 7; index += 1) {
          const angle = game.elapsed * 2.4 + index * (TAU / 7);
          const distance = player.size * (0.94 + (index % 2) * 0.16);
          drawPixelHeart(centerX + Math.cos(angle) * distance, centerY + Math.sin(angle) * distance, 8, index % 2 ? "#ff9bc8" : "#e6b9ff");
        }
        ctx.restore();
      }

      function drawPowerAura() {
        if (game.powerTimer <= 0) {
          return;
        }

        const centerX = player.x;
        const centerY = player.y - player.size * 0.62;
        const pulse = 1 + Math.sin(game.elapsed * 12) * 0.08;
        const radius = player.size * 1.05 * pulse;
        ctx.save();
        ctx.globalAlpha = 0.35 + Math.sin(game.elapsed * 8) * 0.12;
        ctx.fillStyle = "#ffe184";
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, TAU);
        ctx.fill();
        ctx.globalAlpha = 0.9;
        ctx.strokeStyle = "#ff9a75";
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 5]);
        ctx.lineDashOffset = -game.elapsed * 38;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * 1.15, 0, TAU);
        ctx.stroke();
        ctx.setLineDash([]);
        for (let index = 0; index < 5; index += 1) {
          const angle = game.elapsed * 3.4 + index * (TAU / 5);
          const distance = radius * 1.18;
          ctx.fillStyle = index % 2 === 0 ? "#fff4a6" : "#ff89b7";
          ctx.fillRect(
            Math.round(centerX + Math.cos(angle) * distance - 3),
            Math.round(centerY + Math.sin(angle) * distance - 3),
            6,
            6
          );
        }
        ctx.restore();
      }

      function drawMagnetAura() {
        if (game.magnetLevel <= 0) {
          return;
        }

        const centerX = player.x;
        const centerY = player.y - player.size * 0.64;
        const radius = player.size * (0.74 + game.magnetLevel * 0.05);
        ctx.save();
        ctx.globalAlpha = 0.4 + game.magnetLevel * 0.09;
        ctx.strokeStyle = "#e76d9f";
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 6]);
        ctx.lineDashOffset = game.elapsed * 26;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, TAU);
        ctx.stroke();
        ctx.setLineDash([]);
        for (let index = 0; index < 3 + game.magnetLevel; index += 1) {
          const angle = -game.elapsed * (2.2 + game.magnetLevel * 0.25) + index * (TAU / (3 + game.magnetLevel));
          const distance = radius + 7;
          ctx.fillStyle = index % 2 === 0 ? "#ff9fc9" : "#d4b5ff";
          ctx.fillRect(
            Math.round(centerX + Math.cos(angle) * distance - 2),
            Math.round(centerY + Math.sin(angle) * distance - 2),
            4,
            4
          );
        }
        ctx.restore();
      }

      function drawCat() {
        const size = player.size;
        const x = Math.round(player.x);
        const baseY = Math.round(player.y + Math.sin(player.bob) * 1.4);
        const bodyWidth = size * 0.69;
        const bodyHeight = size * 0.48;
        const bodyLeft = x - bodyWidth * 0.5;
        const bodyTop = baseY - bodyHeight;
        const headWidth = size * 0.9;
        const headHeight = size * 0.64;
        const headLeft = x - headWidth * 0.5;
        const headTop = bodyTop - headHeight * 0.72;
        const outline = Math.max(3, Math.round(size * 0.06));

        ctx.save();
        ctx.translate(x, baseY);
        ctx.rotate(player.tilt);
        ctx.translate(-x, -baseY);

        ctx.fillStyle = "rgba(114,68,108,0.2)";
        ctx.fillRect(Math.round(x - size * 0.42), Math.round(baseY - 1), Math.round(size * 0.84), Math.max(4, Math.round(size * 0.1)));

        ctx.fillStyle = "#9c5d93";
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.73), Math.round(bodyTop + bodyHeight * 0.28), Math.round(size * 0.42), Math.round(size * 0.17));
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 1.02), Math.round(bodyTop + bodyHeight * 0.08), Math.round(size * 0.14), Math.round(size * 0.29));
        ctx.fillStyle = "#ffc5dd";
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.75), Math.round(bodyTop + bodyHeight * 0.32), Math.round(size * 0.35), Math.round(size * 0.09));

        ctx.fillStyle = "#9c5d93";
        ctx.fillRect(Math.round(bodyLeft - outline), Math.round(bodyTop - outline), Math.round(bodyWidth + outline * 2), Math.round(bodyHeight + outline * 2));
        ctx.fillStyle = "#fff9fd";
        ctx.fillRect(Math.round(bodyLeft), Math.round(bodyTop), Math.round(bodyWidth), Math.round(bodyHeight));
        ctx.fillStyle = "#ffc2dc";
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.08), Math.round(bodyTop + bodyHeight * 0.42), Math.round(bodyWidth * 0.84), Math.round(bodyHeight * 0.45));
        ctx.fillStyle = "#f292bc";
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.12), Math.round(bodyTop + bodyHeight * 0.18), Math.round(bodyWidth * 0.18), Math.round(bodyHeight * 0.14));
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.69), Math.round(bodyTop + bodyHeight * 0.18), Math.round(bodyWidth * 0.18), Math.round(bodyHeight * 0.14));

        ctx.fillStyle = "#9c5d93";
        ctx.beginPath();
        ctx.moveTo(headLeft + headWidth * 0.05, headTop + headHeight * 0.34);
        ctx.lineTo(headLeft + headWidth * 0.18, headTop - size * 0.18);
        ctx.lineTo(headLeft + headWidth * 0.38, headTop + headHeight * 0.13);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(headLeft + headWidth * 0.62, headTop + headHeight * 0.13);
        ctx.lineTo(headLeft + headWidth * 0.82, headTop - size * 0.18);
        ctx.lineTo(headLeft + headWidth * 0.95, headTop + headHeight * 0.34);
        ctx.closePath();
        ctx.fill();
        ctx.fillRect(Math.round(headLeft - outline), Math.round(headTop + headHeight * 0.15 - outline), Math.round(headWidth + outline * 2), Math.round(headHeight + outline * 0.9));

        ctx.fillStyle = "#fff9fd";
        ctx.beginPath();
        ctx.moveTo(headLeft + headWidth * 0.09, headTop + headHeight * 0.32);
        ctx.lineTo(headLeft + headWidth * 0.2, headTop - size * 0.09);
        ctx.lineTo(headLeft + headWidth * 0.37, headTop + headHeight * 0.2);
        ctx.lineTo(headLeft + headWidth * 0.63, headTop + headHeight * 0.2);
        ctx.lineTo(headLeft + headWidth * 0.8, headTop - size * 0.09);
        ctx.lineTo(headLeft + headWidth * 0.91, headTop + headHeight * 0.32);
        ctx.lineTo(headLeft + headWidth * 0.91, headTop + headHeight * 0.95);
        ctx.lineTo(headLeft + headWidth * 0.09, headTop + headHeight * 0.95);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#ffb0d1";
        ctx.beginPath();
        ctx.moveTo(headLeft + headWidth * 0.17, headTop + headHeight * 0.25);
        ctx.lineTo(headLeft + headWidth * 0.22, headTop + size * 0.02);
        ctx.lineTo(headLeft + headWidth * 0.34, headTop + headHeight * 0.25);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(headLeft + headWidth * 0.66, headTop + headHeight * 0.25);
        ctx.lineTo(headLeft + headWidth * 0.78, headTop + size * 0.02);
        ctx.lineTo(headLeft + headWidth * 0.83, headTop + headHeight * 0.25);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = "#9d6395";
        ctx.fillRect(Math.round(headLeft + headWidth * 0.22), Math.round(headTop + headHeight * 0.49), Math.max(3, Math.round(size * 0.08)), Math.max(4, Math.round(size * 0.11)));
        ctx.fillRect(Math.round(headLeft + headWidth * 0.69), Math.round(headTop + headHeight * 0.49), Math.max(3, Math.round(size * 0.08)), Math.max(4, Math.round(size * 0.11)));
        ctx.fillStyle = "#fffaff";
        ctx.fillRect(Math.round(headLeft + headWidth * 0.24), Math.round(headTop + headHeight * 0.5), 2, 2);
        ctx.fillRect(Math.round(headLeft + headWidth * 0.71), Math.round(headTop + headHeight * 0.5), 2, 2);
        ctx.fillStyle = "#f481ae";
        ctx.fillRect(Math.round(headLeft + headWidth * 0.46), Math.round(headTop + headHeight * 0.65), Math.max(3, Math.round(size * 0.08)), Math.max(2, Math.round(size * 0.05)));
        ctx.fillStyle = "#f6a8ca";
        ctx.fillRect(Math.round(headLeft + headWidth * 0.09), Math.round(headTop + headHeight * 0.64), Math.max(4, Math.round(size * 0.11)), Math.max(3, Math.round(size * 0.06)));
        ctx.fillRect(Math.round(headLeft + headWidth * 0.79), Math.round(headTop + headHeight * 0.64), Math.max(4, Math.round(size * 0.11)), Math.max(3, Math.round(size * 0.06)));

        ctx.fillStyle = "#fffaff";
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.14), Math.round(baseY - size * 0.14), Math.round(size * 0.16), Math.round(size * 0.14));
        ctx.fillRect(Math.round(bodyLeft + bodyWidth * 0.68), Math.round(baseY - size * 0.14), Math.round(size * 0.16), Math.round(size * 0.14));

        ctx.restore();

        const labelY = headTop - size * 0.48;
        const labelWidth = Math.max(58, size * 0.88);
        const labelHeight = Math.max(22, size * 0.27);
        ctx.save();
        roundedRectPath(ctx, x - labelWidth * 0.5, labelY, labelWidth, labelHeight, 8);
        ctx.fillStyle = "#fff6fb";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#d883ad";
        ctx.stroke();
        ctx.fillStyle = "#8f4f84";
        ctx.font = "900 " + Math.max(13, Math.round(size * 0.2)) + "px ui-rounded, Arial Rounded MT Bold, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("İrem", x, labelY + labelHeight * 0.53);
        ctx.restore();
      }

      function drawParticles() {
        for (const particle of particles) {
          const alpha = clamp(particle.life / particle.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.translate(Math.round(particle.x), Math.round(particle.y));
          ctx.rotate(particle.rotation);
          if (particle.kind === "heart") {
            drawPixelHeart(0, 0, particle.size * 1.7, particle.color);
          } else {
            ctx.fillStyle = particle.color;
            ctx.fillRect(-particle.size * 0.5, -particle.size * 0.5, particle.size, particle.size);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fillRect(-particle.size * 0.5, -particle.size * 0.5, Math.max(1, particle.size * 0.35), Math.max(1, particle.size * 0.35));
          }
          ctx.restore();
        }
      }

      function drawFloatTexts() {
        for (const floating of floatTexts) {
          const alpha = clamp(floating.life / floating.maxLife, 0, 1);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "1000 " + Math.round(16 * floating.scale) + "px ui-rounded, Arial Rounded MT Bold, system-ui, sans-serif";
          ctx.lineWidth = Math.max(2, 3 * floating.scale);
          ctx.strokeStyle = "rgba(255,255,255,0.92)";
          ctx.strokeText(floating.text, floating.x, floating.y);
          ctx.fillStyle = floating.color;
          ctx.fillText(floating.text, floating.x, floating.y);
          ctx.restore();
        }
      }

      function drawIntroBanner() {
        if (game.introTimer <= 0) {
          return;
        }

        const fade = game.introTimer < 0.38 ? game.introTimer / 0.38 : 1;
        const width = Math.min(view.width - 34, 332);
        const height = 68;
        const x = (view.width - width) * 0.5;
        const y = Math.max(85, view.height * 0.22);
        ctx.save();
        ctx.globalAlpha = fade;
        ctx.fillStyle = "rgba(137,75,126,0.23)";
        roundedRectPath(ctx, x + 4, y + 6, width, height, 16);
        ctx.fill();
        roundedRectPath(ctx, x, y, width, height, 16);
        ctx.fillStyle = "#fff2f9";
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#e586b5";
        ctx.stroke();
        ctx.fillStyle = "#f49ac1";
        ctx.fillRect(x + 12, y + 11, 10, 10);
        ctx.fillStyle = "#cba5ee";
        ctx.fillRect(x + width - 22, y + height - 21, 10, 10);
        ctx.fillStyle = "#85507c";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "1000 " + Math.round(clamp(view.width * 0.048, 16, 20)) + "px ui-rounded, Arial Rounded MT Bold, system-ui, sans-serif";
        ctx.fillText("İrem'in Dünyası Tehlikede!", view.width * 0.5, y + 27);
        ctx.font = "1000 " + Math.round(clamp(view.width * 0.055, 18, 23)) + "px ui-rounded, Arial Rounded MT Bold, system-ui, sans-serif";
        ctx.fillStyle = "#e45f99";
        ctx.fillText("Kaç! ♥", view.width * 0.5, y + 50);
        ctx.restore();
      }

      function drawSinemStatus() {
        if (game.sinemTimer <= 0) {
          return;
        }

        const seconds = Math.max(1, Math.ceil(game.sinemTimer));
        const text = "SİNEM MODU  •  " + seconds + " sn";
        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "1000 15px ui-rounded, Arial Rounded MT Bold, system-ui, sans-serif";
        const width = ctx.measureText(text).width + 30;
        const x = view.width * 0.5 - width * 0.5;
        const y = game.introTimer > 0
          ? Math.min(view.height * 0.43, 350)
          : Math.max(96, view.height * 0.12);
        roundedRectPath(ctx, x, y, width, 31, 12);
        ctx.fillStyle = "rgba(255, 245, 253, 0.92)";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#d89aff";
        ctx.stroke();
        ctx.fillStyle = "#9b5fc0";
        ctx.fillText(text, view.width * 0.5, y + 16);
        ctx.restore();
      }

      function draw() {
        ctx.setTransform(view.dpr, 0, 0, view.dpr, 0, 0);
        ctx.clearRect(0, 0, view.width, view.height);
        drawBackground();

        let shakeX = 0;
        let shakeY = 0;
        if (game.shakeTimer > 0 && game.shakeDuration > 0) {
          const intensity = game.shakePower * (game.shakeTimer / game.shakeDuration);
          shakeX = random(-intensity, intensity);
          shakeY = random(-intensity * 0.55, intensity * 0.55);
        }

        ctx.save();
        ctx.translate(Math.round(shakeX), Math.round(shakeY));
        for (const obstacle of obstacles) {
          drawPixelBlock(obstacle);
        }
        for (const pickup of pickups) {
          drawPickup(pickup);
        }
        drawShield();
        drawPowerAura();
        drawMagnetAura();
        drawCat();
        drawParticles();
        drawFloatTexts();
        ctx.restore();

        drawSinemStatus();
        drawIntroBanner();
      }

      function loop(timestamp) {
        if (!lastFrameTime) {
          lastFrameTime = timestamp;
        }
        const delta = Math.min(0.033, Math.max(0, (timestamp - lastFrameTime) / 1000));
        lastFrameTime = timestamp;

        if (!game.hidden) {
          update(delta);
        }
        draw();
        window.requestAnimationFrame(loop);
      }

      function movePlayerFromPointer(event) {
        const rect = canvas.getBoundingClientRect();
        const target = event.clientX - rect.left;
        const sidePadding = player.size * 0.5 + 8;
        player.targetX = clamp(target, sidePadding, view.width - sidePadding);
      }

      function onCanvasPointerDown(event) {
        if (game.phase === "gameover" || game.phase === "upgrade") {
          return;
        }
        event.preventDefault();
        startAudio();
        game.pointerId = event.pointerId;
        if (canvas.setPointerCapture) {
          try {
            canvas.setPointerCapture(event.pointerId);
          } catch (error) {
            // Safari can reject capture if the pointer was already released.
          }
        }
        movePlayerFromPointer(event);
      }

      function onCanvasPointerMove(event) {
        if (game.pointerId !== event.pointerId) {
          return;
        }
        event.preventDefault();
        movePlayerFromPointer(event);
      }

      function releaseCanvasPointer(event) {
        if (game.pointerId !== event.pointerId) {
          return;
        }
        event.preventDefault();
        if (canvas.hasPointerCapture && canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
        game.pointerId = null;
      }

      function pressHelp(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        const now = performance.now();
        if (now - lastHelpPress < 260) {
          return;
        }
        lastHelpPress = now;
        activateSinem();
      }

      function pressPower(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        const now = performance.now();
        if (now - lastPowerPress < 260) {
          return;
        }
        lastPowerPress = now;
        activatePower();
      }

      function selectUpgrade(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        const choice = event.currentTarget;
        if (!choice || !choice.dataset) {
          return;
        }
        applyUpgrade(choice.dataset.upgrade);
      }

      function pressRestart(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }
        const now = performance.now();
        if (now - lastRestartPress < 220) {
          return;
        }
        lastRestartPress = now;
        startAudio();
        resetGame();
      }

      canvas.addEventListener("pointerdown", onCanvasPointerDown, { passive: false });
      canvas.addEventListener("pointermove", onCanvasPointerMove, { passive: false });
      canvas.addEventListener("pointerup", releaseCanvasPointer, { passive: false });
      canvas.addEventListener("pointercancel", releaseCanvasPointer, { passive: false });
      canvas.addEventListener("contextmenu", (event) => event.preventDefault(), { passive: false });

      helpButton.addEventListener("pointerdown", pressHelp, { passive: false });
      helpButton.addEventListener("click", pressHelp, { passive: false });
      powerButton.addEventListener("pointerdown", pressPower, { passive: false });
      powerButton.addEventListener("click", pressPower, { passive: false });
      for (const choice of upgradeChoices) {
        choice.addEventListener("pointerdown", selectUpgrade, { passive: false });
        choice.addEventListener("click", selectUpgrade, { passive: false });
      }
      restartButton.addEventListener("pointerdown", pressRestart, { passive: false });
      restartButton.addEventListener("click", pressRestart, { passive: false });

      document.addEventListener("touchmove", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gesturechange", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gestureend", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("dblclick", (event) => event.preventDefault(), { passive: false });

      document.addEventListener("visibilitychange", () => {
        game.hidden = document.hidden;
        lastFrameTime = performance.now();
        if (document.hidden) {
          pauseBackgroundMusic();
        } else if (audioContext && audioContext.state === "running") {
          startBackgroundMusic();
        }
      });

      window.addEventListener("resize", resizeCanvas, { passive: true });
      window.addEventListener("orientationchange", () => {
        window.setTimeout(resizeCanvas, 60);
      }, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", resizeCanvas, { passive: true });
      }

      resizeCanvas();
      resetGame();
      window.requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
