<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#ffd5e9">
  <title>İrem'in Dünyası</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #5d365d;
      --deep-pink: #ef5f9d;
      --pink: #ff9fc9;
      --soft-pink: #ffe2f0;
      --lilac: #c6a4ef;
      --mint: #b9e6c8;
      --white: #fffaff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      width: 100vw;
      height: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #ffd5e9;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: ui-rounded, "Arial Rounded MT Bold", "Nunito", system-ui, sans-serif;
      color: var(--ink);
    }

    button,
    canvas {
      touch-action: none;
    }

    #game-app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      background: #ffd5e9;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #hud {
      position: fixed;
      z-index: 3;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: calc(env(safe-area-inset-left, 0px) + 12px);
      pointer-events: none;
    }

    #adventureHud {
      position: fixed;
      z-index: 3;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      right: calc(env(safe-area-inset-right, 0px) + 12px);
      width: min(164px, 43vw);
      padding: 9px 10px 10px;
      border: 3px solid rgba(255, 255, 255, 0.94);
      border-radius: 14px;
      background: rgba(255, 242, 249, 0.9);
      box-shadow: 0 4px 0 rgba(177, 95, 151, 0.18), 0 8px 18px rgba(151, 76, 130, 0.13);
      color: #794878;
      pointer-events: none;
    }

    .stage-line {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: 0.06em;
    }

    #zoneName {
      overflow: hidden;
      color: #a25d91;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #stageValue {
      flex: 0 0 auto;
      color: #7151a2;
    }

    .progress-label,
    .mission-line {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-top: 8px;
      color: #9a5d8d;
      font-size: 9px;
      font-weight: 1000;
      letter-spacing: 0.055em;
    }

    .progress-track,
    .energy-track {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 9px;
      margin-top: 4px;
      border: 2px solid #f6d3e7;
      border-radius: 999px;
      background: #ead8ea;
    }

    #stageProgressFill,
    #energyFill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f988b9, #c89df2, #8ce0cf);
      box-shadow: 0 0 8px rgba(255, 110, 180, 0.64);
      transition: width 150ms linear;
    }

    .mission-line {
      margin-top: 8px;
      color: #7d649d;
    }

    .upgrade-status {
      margin-top: 8px;
      overflow: hidden;
      color: #a46679;
      font-size: 9px;
      font-weight: 1000;
      letter-spacing: 0.035em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .score-card {
      display: grid;
      grid-template-columns: auto auto;
      align-items: center;
      gap: 8px;
      min-width: 116px;
      padding: 9px 13px 8px;
      border: 3px solid rgba(255, 255, 255, 0.96);
      border-radius: 14px;
      background: rgba(255, 232, 244, 0.9);
      box-shadow: 0 4px 0 rgba(177, 95, 151, 0.22), 0 8px 18px rgba(151, 76, 130, 0.15);
      line-height: 1;
    }

    .score-icon {
      font-size: 21px;
      filter: drop-shadow(0 2px 0 rgba(185, 84, 131, 0.23));
    }

    .score-caption {
      display: block;
      margin-bottom: 3px;
      color: #a65b91;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.11em;
    }

    #scoreValue {
      display: block;
      color: #6c3f6d;
      font-size: 22px;
      font-weight: 1000;
      letter-spacing: 0.02em;
    }

    #helpButton {
      position: fixed;
      z-index: 4;
      right: calc(env(safe-area-inset-right, 0px) + 14px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      width: min(154px, 41vw);
      min-height: 72px;
      padding: 11px 11px 10px;
      border: 3px solid #fff7fc;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffabd2 0%, #f35f9e 100%);
      box-shadow: 0 5px 0 #bf4a7d, 0 0 0 4px rgba(255, 153, 202, 0.35), 0 0 25px rgba(255, 79, 156, 0.82);
      color: #fffafd;
      font: inherit;
      font-weight: 1000;
      line-height: 1.02;
      letter-spacing: -0.02em;
      text-align: center;
      text-shadow: 0 2px 0 rgba(151, 54, 103, 0.45);
      cursor: pointer;
      transform: translateY(0) scale(1);
      animation: button-glow 1.55s ease-in-out infinite alternate;
      transition: filter 120ms ease, transform 120ms ease, box-shadow 120ms ease, background 160ms ease;
      -webkit-appearance: none;
      appearance: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #helpButton:active:not(:disabled) {
      box-shadow: 0 2px 0 #bf4a7d, 0 0 0 4px rgba(255, 153, 202, 0.25), 0 0 18px rgba(255, 79, 156, 0.75);
      transform: translateY(3px) scale(0.98);
    }

    #helpButton.is-active {
      background: linear-gradient(180deg, #ef8eff 0%, #b779ef 46%, #ff78b7 100%);
      box-shadow: 0 5px 0 #8254b4, 0 0 0 4px rgba(255, 238, 253, 0.58), 0 0 30px rgba(211, 128, 255, 0.95);
      animation-duration: 0.7s;
    }

    #helpButton.is-cooling,
    #helpButton:disabled:not(.is-active) {
      background: linear-gradient(180deg, #d9bed7 0%, #ae8fac 100%);
      box-shadow: 0 4px 0 #806b80, 0 0 0 3px rgba(255, 255, 255, 0.44);
      color: #fff8ff;
      cursor: default;
      animation: none;
      filter: saturate(0.72);
    }

    #helpButton.is-active:disabled {
      cursor: default;
      filter: brightness(1.08) saturate(1.08);
    }

    #powerButton {
      position: fixed;
      z-index: 4;
      left: calc(env(safe-area-inset-left, 0px) + 14px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      width: min(148px, 39vw);
      min-height: 68px;
      padding: 9px 10px 8px;
      border: 3px solid #fffdf4;
      border-radius: 17px;
      background: linear-gradient(180deg, #ffe996 0%, #f6ae61 100%);
      box-shadow: 0 5px 0 #bd7c51, 0 0 0 4px rgba(255, 232, 145, 0.32), 0 0 20px rgba(255, 206, 99, 0.55);
      color: #744c59;
      font: inherit;
      font-weight: 1000;
      line-height: 1.02;
      text-align: center;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.46);
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
      -webkit-appearance: none;
      appearance: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    #powerButton.is-ready {
      animation: power-glow 0.85s ease-in-out infinite alternate;
    }

    #powerButton.is-active {
      background: linear-gradient(180deg, #fff2a9 0%, #ff9f70 54%, #f579a7 100%);
      box-shadow: 0 5px 0 #ba6077, 0 0 0 4px rgba(255, 246, 191, 0.66), 0 0 28px rgba(255, 179, 91, 0.95);
      color: #7d3d5b;
      animation: power-glow 0.48s ease-in-out infinite alternate;
      filter: saturate(1.16);
    }

    #powerButton:active:not(:disabled) {
      transform: translateY(3px) scale(0.98);
      box-shadow: 0 2px 0 #bd7c51, 0 0 0 3px rgba(255, 232, 145, 0.25);
    }

    #powerButton:disabled:not(.is-active) {
      background: linear-gradient(180deg, #e3d8cf 0%, #b4a69e 100%);
      box-shadow: 0 4px 0 #82766f, 0 0 0 3px rgba(255, 255, 255, 0.42);
      color: #fffaff;
      cursor: default;
      filter: saturate(0.65);
      animation: none;
    }

    #powerButton.is-active:disabled {
      cursor: default;
    }

    .power-main {
      display: block;
      font-size: clamp(12px, 3.4vw, 14px);
    }

    #powerStatus {
      display: block;
      min-height: 13px;
      margin-top: 4px;
      font-size: 10px;
      font-weight: 1000;
      letter-spacing: 0.04em;
    }

    .help-main {
      display: block;
      font-size: clamp(13px, 3.6vw, 15px);
    }

    #helpCountdown {
      display: block;
      min-height: 14px;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: 0.04em;
    }

    #restartOverlay {
      position: fixed;
      z-index: 8;
      inset: 0;
      display: grid;
      place-items: center;
      padding: calc(env(safe-area-inset-top, 0px) + 22px) 24px calc(env(safe-area-inset-bottom, 0px) + 22px);
      background: rgba(89, 42, 86, 0.39);
      opacity: 0;
      pointer-events: none;
      transition: opacity 110ms ease;
    }

    #restartOverlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    #upgradeOverlay {
      position: fixed;
      z-index: 7;
      inset: 0;
      display: grid;
      place-items: center;
      padding: calc(env(safe-area-inset-top, 0px) + 18px) 18px calc(env(safe-area-inset-bottom, 0px) + 18px);
      background: rgba(82, 45, 98, 0.36);
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms ease;
    }

    #upgradeOverlay.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .upgrade-card {
      width: min(366px, 94vw);
      padding: 20px 16px 16px;
      border: 4px solid #fffaff;
      border-radius: 23px;
      background: linear-gradient(180deg, #fff3fb 0%, #efd8f5 100%);
      box-shadow: 0 8px 0 #aa70a3, 0 24px 48px rgba(65, 31, 77, 0.27);
      text-align: center;
    }

    .upgrade-kicker {
      margin-bottom: 4px;
      color: #d06c9d;
      font-size: 11px;
      font-weight: 1000;
      letter-spacing: 0.12em;
    }

    .upgrade-card h2 {
      margin: 0;
      color: #734773;
      font-size: 24px;
      line-height: 1.08;
    }

    .upgrade-card p {
      margin: 8px 0 15px;
      color: #9a5e91;
      font-size: 13px;
      font-weight: 800;
    }

    .upgrade-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .upgrade-choice {
      min-height: 124px;
      padding: 10px 5px 8px;
      border: 3px solid #fffaff;
      border-radius: 15px;
      background: linear-gradient(180deg, #ffc5e0 0%, #e992c0 100%);
      box-shadow: 0 4px 0 #b96695;
      color: #77486f;
      font: inherit;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    .upgrade-choice:nth-child(2) {
      background: linear-gradient(180deg, #d8c0ff 0%, #b994e6 100%);
      box-shadow: 0 4px 0 #846db4;
    }

    .upgrade-choice:nth-child(3) {
      background: linear-gradient(180deg, #c6efd8 0%, #94ceaf 100%);
      box-shadow: 0 4px 0 #679f82;
    }

    .upgrade-choice:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 rgba(83, 56, 85, 0.5);
    }

    .upgrade-icon {
      display: block;
      margin-bottom: 5px;
      font-size: 24px;
      line-height: 1;
    }

    .upgrade-title {
      display: block;
      font-size: 12px;
      font-weight: 1000;
      line-height: 1.02;
    }

    .upgrade-description {
      display: block;
      margin-top: 5px;
      font-size: 9px;
      font-weight: 800;
      line-height: 1.1;
    }

    .restart-card {
      width: min(320px, 92vw);
      padding: 22px 20px 19px;
      border: 4px solid #fffaff;
      border-radius: 24px;
      background: linear-gradient(180deg, #ffe8f4 0%, #f8cae4 100%);
      box-shadow: 0 8px 0 #ba719d, 0 22px 50px rgba(70, 28, 65, 0.28);
      text-align: center;
    }

    .restart-cat {
      margin-bottom: 4px;
      font-size: 38px;
      line-height: 1;
    }

    .restart-card h1 {
      margin: 0;
      color: #774776;
      font-size: 25px;
      line-height: 1.08;
    }

    .restart-card p {
      margin: 10px 0 17px;
      color: #9c5c91;
      font-size: 15px;
      font-weight: 800;
    }

    #restartButton {
      width: 100%;
      min-height: 56px;
      border: 3px solid #fffaff;
      border-radius: 15px;
      background: linear-gradient(180deg, #ff9ac7 0%, #eb5d9a 100%);
      box-shadow: 0 5px 0 #b74375;
      color: #fffaff;
      font: inherit;
      font-size: 18px;
      font-weight: 1000;
      text-shadow: 0 2px 0 rgba(130, 41, 85, 0.42);
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
    }

    #restartButton:active {
      box-shadow: 0 2px 0 #b74375;
      transform: translateY(3px);
    }

    @keyframes button-glow {
      from {
        filter: brightness(1);
      }
      to {
        filter: brightness(1.1) saturate(1.13);
      }
    }

    @keyframes power-glow {
      from {
        filter: brightness(1) saturate(1);
      }
      to {
        filter: brightness(1.13) saturate(1.2);
      }
    }

    @media (max-height: 560px) {
      #helpButton {
        min-height: 60px;
        padding: 8px;
      }

      .help-main {
        font-size: 12px;
      }

      #hud {
        top: calc(env(safe-area-inset-top, 0px) + 7px);
        left: calc(env(safe-area-inset-left, 0px) + 8px);
      }

      .score-card {
        padding: 6px 9px;
      }

      #adventureHud {
        top: calc(env(safe-area-inset-top, 0px) + 7px);
        right: calc(env(safe-area-inset-right, 0px) + 8px);
        padding: 6px 7px;
      }

      #powerButton {
        min-height: 57px;
        padding: 7px;
      }
    }
  </style>
</head>
<body>
  <main id="game-app" aria-label="İrem'in Dünyası oyunu">
    <canvas id="gameCanvas" aria-label="İrem'i sağa sola sürükleyerek düşen bloklardan kaçır"></canvas>

    <div id="hud" aria-live="polite" aria-atomic="true">
      <div class="score-card">
        <span class="score-icon" aria-hidden="true">♥</span>
        <span>
          <span class="score-caption">SKOR</span>
          <span id="scoreValue">0</span>
        </span>
      </div>
    </div>

    <div id="adventureHud" aria-live="polite" aria-atomic="true">
      <div class="stage-line">
        <span id="zoneName">Şeker Ormanı</span>
        <span id="stageValue">BÖLÜM 1</span>
      </div>
      <div class="progress-label">
        <span>DÜNYA YOLU</span>
        <span id="stageProgressText">0%</span>
      </div>
      <div class="progress-track"><span id="stageProgressFill"></span></div>
      <div class="mission-line">
        <span id="missionLabel">KRİSTAL MİSYONU</span>
        <span id="missionValue">0 / 3</span>
      </div>
      <div class="progress-label">
        <span>PATİ ENERJİSİ</span>
        <span id="energyValue">0%</span>
      </div>
      <div class="energy-track"><span id="energyFill"></span></div>
      <div id="upgradeStatus" class="upgrade-status">GÜÇLER: Keşfediliyor</div>
    </div>

    <button id="helpButton" type="button" aria-label="Sinem'den Yardım Al">
      <span id="helpMain" class="help-main">Sinem'den<br>Yardım Al!</span>
      <span id="helpCountdown" aria-hidden="true">Hazır! ♥</span>
    </button>

    <button id="powerButton" type="button" aria-label="Pati Patlaması için enerji topla" disabled>
      <span id="powerMain" class="power-main">Pati Patlaması</span>
      <span id="powerStatus" aria-hidden="true">Enerji 0%</span>
    </button>

    <section id="upgradeOverlay" role="dialog" aria-modal="true" aria-labelledby="upgradeTitle">
      <div class="upgrade-card">
        <div class="upgrade-kicker">BÖLÜM TAMAMLANDI</div>
        <h2 id="upgradeTitle">Pati Sandığı Açıldı!</h2>
        <p id="upgradeText">Yeni bölüm için bir sihir seç.</p>
        <div class="upgrade-grid">
          <button class="upgrade-choice" type="button" data-upgrade="magnet">
            <span class="upgrade-icon" aria-hidden="true">🧲</span>
            <span class="upgrade-title">Kalp Mıknatısı</span>
            <span class="upgrade-description">Ekranın büyük kısmındaki ödüller hızla İrem'e uçar.</span>
          </button>
          <button class="upgrade-choice" type="button" data-upgrade="fortune">
            <span class="upgrade-icon" aria-hidden="true">💎</span>
            <span class="upgrade-title">Kristal Şansı</span>
            <span class="upgrade-description">Nadir kristaller çok daha sık düşer.</span>
          </button>
          <button class="upgrade-choice" type="button" data-upgrade="grace">
            <span class="upgrade-icon" aria-hidden="true">🫧</span>
            <span class="upgrade-title">Yumuşak İniş</span>
            <span class="upgrade-description">İki çarpışmayı pembe kalkanla atlat.</span>
          </button>
        </div>
      </div>
    </section>

    <section id="restartOverlay" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
      <div class="restart-card">
        <div class="restart-cat" aria-hidden="true">🐾</div>
        <h1 id="gameOverTitle">Minik Bir Çarpışma!</h1>
        <p>Skorun: <span id="finalScore">0</span></p>
        <button id="restartButton" type="button">Yeniden Başla</button>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
      const scoreValue = document.getElementById("scoreValue");
      const zoneName = document.getElementById("zoneName");
      const stageValue = document.getElementById("stageValue");
      const stageProgressText = document.getElementById("stageProgressText");
      const stageProgressFill = document.getElementById("stageProgressFill");
      const missionLabel = document.getElementById("missionLabel");
      const missionValue = document.getElementById("missionValue");
      const energyValue = document.getElementById("energyValue");
      const energyFill = document.getElementById("energyFill");
      const upgradeStatus = document.getElementById("upgradeStatus");
      const helpButton = document.getElementById("helpButton");
      const helpMain = document.getElementById("helpMain");
      const helpCountdown = document.getElementById("helpCountdown");
      const powerButton = document.getElementById("powerButton");
      const powerMain = document.getElementById("powerMain");
      const powerStatus = document.getElementById("powerStatus");
      const upgradeOverlay = document.getElementById("upgradeOverlay");
      const upgradeText = document.getElementById("upgradeText");
      const upgradeChoices = Array.from(document.querySelectorAll("[data-upgrade]"));
      const restartOverlay = document.getElementById("restartOverlay");
      const restartButton = document.getElementById("restartButton");
      const finalScore = document.getElementById("finalScore");

      const TAU = Math.PI * 2;
      const MAX_DPR = 2;
      const MAX_PARTICLES = 150;
      const MAX_FLOAT_TEXTS = 14;
      const palette = {
        ink: "#5d365d",
        softInk: "#895580",
        sky: "#ffd8ea",
        skyLight: "#ffe8f3",
        cloud: "#fff8fc",
        lilac: "#c5a6ed",
        lilacDeep: "#9a70c9",
        pink: "#ff98c5",
        pinkDeep: "#e85e9c",
        pinkPale: "#ffe1f0",
        mint: "#b9e6c8",
        mintDeep: "#79b993",
        butter: "#ffe69b",
        white: "#fffaff",
        shadow: "#8f5d88"
      };

      const zones = [
        {
          name: "Şeker Ormanı",
          sky: "#ffd8ea",
          skyLight: "#ffe8f3",
          hillTones: ["#d5b7f0", "#c8a5e8", "#e0c4f3", "#bfe6cc"],
          hillCaps: ["#f0d9ff", "#e7cbf5", "#d8f0db"],
          ground: "#79b993",
          grass: "#b9e6c8",
          grassLight: "#ddf5d9"
        },
        {
          name: "Ay Işığı Blokları",
          sky: "#d9d0f5",
          skyLight: "#f2eaff",
          hillTones: ["#bca8e5", "#9f8bc9", "#d3c4ef", "#c0cde9"],
          hillCaps: ["#f0e9ff", "#ddcefa", "#e0e7ff"],
          ground: "#889bc3",
          grass: "#c2d6e8",
          grassLight: "#e2eff5"
        },
        {
          name: "Nane Bulutları",
          sky: "#caeee3",
          skyLight: "#edfff5",
          hillTones: ["#a8d8be", "#b6cfe6", "#d2e8c1", "#c6b9ea"],
          hillCaps: ["#e6f8df", "#e3efff", "#f2e8ff"],
          ground: "#6db38f",
          grass: "#b9e6c8",
          grassLight: "#e4f8d9"
        },
        {
          name: "Pırıltı Vadisi",
          sky: "#ffe0b8",
          skyLight: "#fff5d9",
          hillTones: ["#e6b4cb", "#d5a9e5", "#f0c98c", "#b8d9c5"],
          hillCaps: ["#ffe8f3", "#f5e5ff", "#fff0c6"],
          ground: "#a68c73",

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(start, end, amount) {
        return start + (end - start) * amount;
      }

      function getGroundY() {
        return view.height - clamp(view.height * 0.085, 44, 70);

      function roundedRectPath(context, x, y, width, height, radius) {
        const r = Math.min(radius, width * 0.5, height * 0.5);
        context.beginPath();
        context.moveTo(x + r, y);
        context.arcTo(x + width, y, x + width, y + height, r);
        context.arcTo(x + width, y + height, x, y + height, r);
        context.arcTo(x, y + height, x, y, r);
        context.arcTo(x, y, x + width, y, r);
        context.closePath();
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const width = Math.max(1, Math.round(rect.width));
        const height = Math.max(1, Math.round(rect.height));
        const dpr = Math.min(window.devicePixelRatio || 1, MAX_DPR);

        view.width = width;
        view.height = height;
        view.dpr = dpr;
        canvas.width = Math.max(1, Math.round(width * dpr));
        canvas.height = Math.max(1, Math.round(height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;

        player.size = clamp(view.width * 0.195, 58, 86);
        const sidePadding = player.size * 0.5 + 8;
        player.x = clamp(player.x || view.width * 0.5, sidePadding, view.width - sidePadding);
        player.targetX = clamp(player.targetX || player.x, sidePadding, view.width - sidePadding);
        player.y = getGroundY() - 4;
        buildBackground();

      function startAudio() {
        const AudioConstructor = window.AudioContext || window.webkitAudioContext;
        if (!AudioConstructor) {
          return;
        }

        if (!audioContext) {
          audioContext = new AudioConstructor();
        }

        if (audioContext.state !== "running") {
          audioContext.resume().then(startBackgroundMusic).catch(() => {});
        } else {
          startBackgroundMusic();
        }
      }

      function scheduleMusicTone(frequency, startTime, duration, volume, type) {
        if (!audioContext || !musicMaster || frequency <= 0) {
          return;
        }

        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();
        oscillator.type = type || "sine";
        oscillator.frequency.setValueAtTime(frequency, startTime);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.025);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
        oscillator.connect(gain);
        gain.connect(musicMaster);
        oscillator.start(startTime);
        oscillator.stop(startTime + duration + 0.03);
      }

      function scheduleRomanticMusicStep(step, startTime) {
        const chordProgression = [
          [261.63, 329.63, 392.0, 493.88],
          [220.0, 261.63, 329.63, 392.0],
          [174.61, 220.0, 261.63, 329.63],
          [196.0, 246.94, 293.66, 392.0]
        ];
        const bassNotes = [130.81, 110.0, 87.31, 98.0];
        const melodyPattern = [12, 19, 24, 19, 17, 24, 29, 24];
        const stepDuration = 60 / 76 / 2;
        const chordIndex = Math.floor(step / 8) % chordProgression.length;
        const chord = chordProgression[chordIndex];
        const arpeggioIndex = [0, 2, 1, 3, 2, 1, 2, 3][step % 8];

        scheduleMusicTone(chord[arpeggioIndex], startTime, stepDuration * 0.92, 0.042, "triangle");
        if (step % 8 === 0) {
          scheduleMusicTone(bassNotes[chordIndex], startTime, stepDuration * 6.8, 0.025, "sine");
          scheduleMusicTone(chord[0] * 0.5, startTime, stepDuration * 4.2, 0.014, "triangle");
        }
        if (step % 4 === 2) {
          const melody = chord[0] * Math.pow(2, melodyPattern[(Math.floor(step / 2) + chordIndex) % melodyPattern.length] / 12);
          scheduleMusicTone(melody, startTime, stepDuration * 1.55, 0.019, "sine");
        }
      }

      function scheduleBackgroundMusic() {
        if (!audioContext || audioContext.state !== "running" || document.hidden) {
          return;
        }

        const lookAhead = 0.42;
        const stepDuration = 60 / 76 / 2;
        while (musicNextNoteTime < audioContext.currentTime + lookAhead) {
          scheduleRomanticMusicStep(musicStep, musicNextNoteTime);
          musicNextNoteTime += stepDuration;
          musicStep = (musicStep + 1) % 32;
        }
      }

      function startBackgroundMusic() {
        if (!audioContext || audioContext.state !== "running" || document.hidden) {
          return;
        }

        if (!musicMaster) {
          musicMaster = audioContext.createGain();
          musicMaster.gain.setValueAtTime(0.0001, audioContext.currentTime);
          musicMaster.connect(audioContext.destination);
        }

        musicMaster.gain.cancelScheduledValues(audioContext.currentTime);
        musicMaster.gain.setValueAtTime(Math.max(0.0001, musicMaster.gain.value), audioContext.currentTime);
        musicMaster.gain.linearRampToValueAtTime(0.58, audioContext.currentTime + 0.35);

        if (!musicStarted) {
          musicStarted = true;
          musicNextNoteTime = audioContext.currentTime + 0.08;
          musicStep = 0;
          scheduleBackgroundMusic();
          musicScheduler = window.setInterval(scheduleBackgroundMusic, 120);
        } else if (musicNextNoteTime < audioContext.currentTime) {
          musicNextNoteTime = audioContext.currentTime + 0.08;
          scheduleBackgroundMusic();
        }
      }

      function pauseBackgroundMusic() {
        if (!musicMaster || !audioContext) {
          return;
        }

        musicMaster.gain.cancelScheduledValues(audioContext.currentTime);
        musicMaster.gain.setValueAtTime(Math.max(0.0001, musicMaster.gain.value), audioContext.currentTime);
        musicMaster.gain.linearRampToValueAtTime(0.0001, audioContext.currentTime + 0.12);
      }

      function playTone(options) {
        if (!audioContext || audioContext.state !== "running") {
          return;
        }

        const now = audioContext.currentTime;
        const duration = options.duration || 0.12;
        const oscillator = audioContext.createOscillator();
        const gain = audioContext.createGain();

        oscillator.type = options.type || "sine";
        oscillator.frequency.setValueAtTime(options.frequency || 440, now);
        if (options.slideTo) {
          oscillator.frequency.exponentialRampToValueAtTime(Math.max(1, options.slideTo), now + duration);
        }

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(options.volume || 0.05, now + 0.008);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(now);
        oscillator.stop(now + duration + 0.025);
      }

      function updateScoreDisplay(force) {

        game.score += points;
        if (game.phase !== "gameover" && game.phase !== "upgrade") {
          game.stageProgress += points;

        updateScoreDisplay(false);
        updateAdventureDisplay(false);

      function updateAdventureDisplay(force) {
        const zone = getZone();
        const progress = clamp(game.stageProgress / Math.max(1, game.stageGoal), 0, 1);
        const progressPercent = Math.round(progress * 100);
        const missionText = game.missionComplete
          ? "TAMAMLANDI!"
          : game.crystalCount + " / " + game.crystalTarget;
        const energyPercent = Math.round(game.energy);
        const boosts = [];
        if (game.magnetLevel > 0) {
          boosts.push("🧲" + game.magnetLevel);
        }
        if (game.fortuneLevel > 0) {
          boosts.push("💎" + game.fortuneLevel);
        }
        if (game.graceCharges > 0) {
          boosts.push("🫧" + game.graceCharges);
        }
        const boostText = boosts.length > 0 ? "GÜÇLER: " + boosts.join("  ") : "GÜÇLER: Keşfediliyor";
        const nextKey = [
          zone.name,
          game.stage,
          progressPercent,
          missionText,
          energyPercent,
          game.graceCharges,
          game.magnetLevel,
          game.fortuneLevel,
          boostText
        ].join("|");

        if (!force && nextKey === game.lastAdventureLabel) {
          return;
        }

        game.lastAdventureLabel = nextKey;
        zoneName.textContent = zone.name;
        stageValue.textContent = "BÖLÜM " + game.stage;
        stageProgressText.textContent = progressPercent + "%";
        stageProgressFill.style.width = progressPercent + "%";
        missionLabel.textContent = game.missionComplete

          : "KRİSTAL MİSYONU";
        missionValue.textContent = missionText;
        energyValue.textContent = energyPercent + "%";
        energyFill.style.width = energyPercent + "%";
        upgradeStatus.textContent = boostText;

      function updatePowerButton(force) {
        let mainText = "Pati Patlaması";
        let subText = "Enerji " + Math.round(game.energy) + "%";
        let label = "Pati Patlaması için enerji topla";
        let mode = "charging";
        let disabled = true;

        if (game.phase === "gameover") {
          mainText = "Pati Dinleniyor";
          subText = "Yeni turda hazır";
          label = "Pati Patlaması yeni turda hazır";
          mode = "charging";
        } else if (game.phase === "upgrade") {
          mainText = "Sandık Açılıyor";
          subText = "Bir sihir seç";
          label = "Bölüm ödülü seçiliyor";
          mode = "charging";
        } else if (game.powerTimer > 0) {
          const seconds = Math.max(1, Math.ceil(game.powerTimer));
          mainText = "PATİ MODU";
          subText = seconds + " sn patlama!";
          label = "Pati Patlaması aktif, " + seconds + " saniye";
          mode = "active";
        } else if (game.energy >= 100) {
          mainText = "Pati Patlaması";
          subText = "Hazır! Dokun ♥";
          label = "Pati Patlamasını kullan";
          mode = "ready";
          disabled = false;
        }

        const nextKey = mode + "|" + mainText + "|" + subText + "|" + disabled;
        if (!force && nextKey === game.lastPowerLabel) {

        game.lastPowerLabel = nextKey;
        powerMain.textContent = mainText;
        powerStatus.textContent = subText;

        powerButton.classList.toggle("is-ready", mode === "ready");

      function gainEnergy(amount) {
        if (game.phase === "gameover" || game.phase === "upgrade") {

        const previousEnergy = game.energy;
        game.energy = clamp(game.energy + amount, 0, 100);

          addFloatText("Pati Patlaması Hazır!", player.x, player.y - player.size * 1.82, "#b56a54", 0.82);
